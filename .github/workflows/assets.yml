name: Build assets check

# Ověřuje, že zbuilděný frontend ve web/www/assets odpovídá zdrojům v assets/.
# Build se commituje do gitu (napevno svázaný s verzí), takže CI rebuildne a porovná –
# když se liší, někdo změnil assets/ a zapomněl commitnout build.

on:
  push:
  pull_request:

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'      # stejná major jako lokálně (host má v24)
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Ověř, že je build commitnutý
        run: |
          git add -A web/www/assets
          if ! git diff --cached --quiet -- web/www/assets; then
            echo "::error::web/www/assets je neaktuální – spusť 'npm run build' a commitni výsledek."
            git --no-pager diff --cached --stat -- web/www/assets
            exit 1
          fi
          echo "OK: build odpovídá zdrojům."
