name: Build assets check

# Verifies that the built frontend in web/www/assets matches the sources in assets/.
# The build is committed to git (pinned to the revision), so CI rebuilds and compares –
# a mismatch means someone changed assets/ without committing a fresh build.

on:
  push:
  pull_request:

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'      # same major as local (host runs v24)
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Build commit verification
        run: |
          git add -A web/www/assets
          if ! git diff --cached --quiet -- web/www/assets; then
            echo "::error::web/www/assets is out of date – run 'npm run build' and commit the result."
            git --no-pager diff --cached --stat -- web/www/assets
            exit 1
          fi
          echo "OK: build matches sources."
